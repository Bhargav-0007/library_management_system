# ===================================================================
# Test profile - H2 in-memory, Flyway enabled
# ===================================================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXMtb25seS0xMjM0NTY3ODk=
app.jwt.expiration-ms=3600000
app.loan.duration-days=14
app.loan.fine-per-day=0.50

logging.level.com.mini_project.library=DEBUG
