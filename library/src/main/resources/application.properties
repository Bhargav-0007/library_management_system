# ===================================================================
# Library Management System - Application Configuration
# ===================================================================

spring.application.name=library-management-system
server.port=8088

# Active profile: dev | prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===================================================================
# JWT Configuration
# ===================================================================
# Generate a strong secret: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1saWJyYXJ5LW1hbmFnZW1lbnQtc3lzdGVtLTIwMjQ=}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===================================================================
# Business Rules
# ===================================================================
app.loan.duration-days=${LOAN_DURATION_DAYS:14}
app.loan.fine-per-day=${FINE_PER_DAY:0.50}

# ===================================================================
# Logging
# ===================================================================
logging.level.com.mini_project.library=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
